name: Build for Windows and Ubuntu

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.10']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        pyinstaller --onefile \
          --name "TelegramSender_Ubuntu" \
          --hidden-import pandas \
          --hidden-import telethon \
          --hidden-import nest_asyncio \
          --hidden-import openpyxl \
          --hidden-import PIL \
          --hidden-import Pillow \
          --collect-all PIL \
          telegram_sender.py

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        pyinstaller --onefile `
          --name "TelegramSender_Windows" `
          --hidden-import pandas `
          --hidden-import telethon `
          --hidden-import nest_asyncio `
          --hidden-import openpyxl `
          --hidden-import PIL `
          --hidden-import Pillow `
          --collect-all PIL `
          telegram_sender.py

    - name: Upload Ubuntu executable
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: TelegramSender-Ubuntu
        path: dist/TelegramSender_Ubuntu

    - name: Upload Windows executable
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: TelegramSender-Windows
        path: dist/TelegramSender_Windows.exe
