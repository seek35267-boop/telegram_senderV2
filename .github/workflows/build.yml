name: Build Telegram Sender V2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.10']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile `
          --name "TelegramSenderV2_Windows" `
          --hidden-import pandas `
          --hidden-import telethon `
          --hidden-import nest_asyncio `
          --hidden-import openpyxl `
          telegram_sender.py

    - name: Build with PyInstaller (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --onefile \
          --name "TelegramSenderV2_Ubuntu" \
          --hidden-import pandas \
          --hidden-import telethon \
          --hidden-import nest_asyncio \
          --hidden-import openpyxl \
          telegram_sender.py

    - name: Upload Windows executable
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: TelegramSenderV2-Windows
        path: dist/TelegramSenderV2_Windows.exe

    - name: Upload Ubuntu executable
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: TelegramSenderV2-Ubuntu
        path: dist/TelegramSenderV2_Ubuntu
